services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: stampy
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - C:/Users/ulano/Desktop/projects/stampy/src/sql/init.sql:/docker-entrypoint-initdb.d/init.sql

volumes:
  postgres_data:
